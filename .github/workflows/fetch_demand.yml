name: Descarga diaria demanda CENACE

on:
  schedule:
    # Corre a las 23:30 hora México (05:30 UTC al día siguiente)
    - cron: "30 5 * * *"
  workflow_dispatch:   # permite correrlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests pandas beautifulsoup4

      - name: "Paso 1: Descargar balance oficial (si ya está publicado)"
        run: python scripts/fetch_balance_portal.py --days 30
        continue-on-error: true   # no romper el workflow si CENACE está caído

      - name: "Paso 2: Rellenar fechas faltantes con estimados"
        run: python scripts/fill_missing_demand.py

      - name: "Paso 3: Descargar demanda del día actual (API en vivo)"
        run: python scripts/fetch_daily_demand.py --overwrite

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_raw/demand/daily_api/ data_raw/demand/balance_2026/
          if git diff --cached --quiet; then
            echo "Sin cambios nuevos."
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "Auto: demanda CENACE $DATE"
            git push
          fi
